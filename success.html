<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef1f5;
        }

        .box {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: green;
        }

        button {
            margin-top: 20px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: black;
            color: white;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🎉 Order Placed Successfully!</h1>
    <p>Thank you for shopping with us.</p>

    <a href="products.html">
        <button>Continue Shopping</button>
    </a>
</div>

</body>
</html>

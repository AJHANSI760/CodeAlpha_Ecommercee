<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <style>
        body {
            font-family: Arial;
            background: #eef1f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #222;
            color: white;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.8;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: blue;
        }
    </style>

</head>

<body>

<h1>🛍️ MY STORE</h1>

<div class="grid">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=600&q=80">
        <h2>Shirt</h2>
        <p>₹500</p>
        <button onclick="addToCart('Shirt', 500)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=600&q=80">
        <h2>Shoes</h2>
        <p>₹1200</p>
        <button onclick="addToCart('Shoes', 1200)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80">
        <h2>Watch</h2>
        <p>₹2000</p>
        <button onclick="addToCart('Watch', 2000)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=600&q=80">
        <h2>Bag</h2>
        <p>₹800</p>
        <button onclick="addToCart('Bag', 800)">Add to Cart</button>
    </div>

</div>

<a href="cart.html">Go to Cart 🛒</a>

<script>

function addToCart(name, price) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let item = cart.find(i => i.name === name);

    if (item) {
        item.qty = (item.qty || 1) + 1;
    } else {
        cart.push({
            name: name,
            price: Number(price),
            qty: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Added to cart ✅");
}

</script>

</body>
</html>
